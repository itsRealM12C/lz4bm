<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LZ4P8 BMP Extractor</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #12151c;
    --panel-2: #171b24;
    --border: #242938;
    --text: #e6e9f0;
    --text-dim: #8890a4;
    --accent: #7c9eff;
    --accent-2: #5eead4;
    --ok: #5eead4;
    --warn: #fbbf24;
    --err: #fb7185;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(124,158,255,0.08), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(94,234,212,0.06), transparent 40%),
      var(--bg);
    color: var(--text);
    padding: 40px 24px;
    max-width: 780px;
    margin: 0 auto;
    line-height: 1.5;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .header svg { flex-shrink: 0; }

  h3 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin: 6px 0 28px;
    max-width: 60ch;
  }

  .subtitle code {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 5px;
    font-size: 13px;
    color: var(--accent-2);
  }

  .dropzone {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .dropzone:hover, .dropzone.drag {
    border-color: var(--accent);
    background: var(--panel-2);
  }

  .dropzone svg {
    display: block;
    margin: 0 auto 10px;
    width: 34px;
    height: 34px;
    stroke: var(--accent);
  }

  .dropzone .dz-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .dropzone .dz-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  #fileInput { display: none; }

  .filename-pill {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding: 7px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--accent-2);
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 28px 0 10px;
  }

  .section-label svg { stroke: var(--text-dim); }

  #log {
    font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 12.5px;
    background: #05060a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    max-height: 320px;
    overflow: auto;
    white-space: pre-wrap;
    color: var(--text-dim);
    display: none;
  }

  #log .ok { color: var(--ok); }
  #log .warn { color: var(--warn); }
  #log .err { color: var(--err); }
  #log .hi { color: var(--accent); }

  #images {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  canvas {
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 100%;
    image-rendering: pixelated;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: #0b0d12;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 20px -8px rgba(124,158,255,0.5);
  }

  .download-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 26px -8px rgba(124,158,255,0.65);
  }

  .download-btn svg { stroke: #0b0d12; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  @media (max-width: 520px) {
    .info-grid { grid-template-columns: 1fr; }
  }

  .info-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .info-card .k {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .info-card .v {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-family: 'SF Mono', Consolas, monospace;
  }

  .info-card .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: inherit;
    font-weight: 400;
  }

  .chunk-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    font-family: 'SF Mono', Consolas, monospace;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .chunk-table th, .chunk-table td {
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }

  .chunk-table th:first-child, .chunk-table td:first-child { text-align: left; }

  .chunk-table th {
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    background: var(--panel-2);
  }
  
  -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
  .chunk-table tr:last-child td { border-bottom: none; }
  .chunk-table td.mono-dim { color: var(--text-dim); }
</style>
</head>
<body>
<div class="header">
  <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24">
        <stop offset="0%" stop-color="#7c9eff"/>
        <stop offset="100%" stop-color="#5eead4"/>
      </linearGradient>
    </defs>
    <rect x="3" y="3" width="18" height="18" rx="4"/>
    <path d="M8 12h8M8 8h5M8 16h3"/>
  </svg>
  <h3>LZ4P8 Extractor</h3>
</div>
<p class="subtitle">
  Reassembles a <code>LZ4P8</code> container back into its original BMP. It's not standard LZ4-frame data —
  a custom header describes N raw LZ4 <em>block</em>-format chunks (256KB decompressed each) that concatenate
  into one plain bitmap.
</p>

<label class="dropzone" id="dropzone" for="fileInput">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 18a4 4 0 01-1-7.87A5.5 5.5 0 0116.9 8.05 4.5 4.5 0 0117 17H7z"/>
    <path d="M12 12v6M9.5 14.5L12 12l2.5 2.5"/>
  </svg>
  <div class="dz-title">Drop a file or click to browse</div>
  <div class="dz-sub">.bin / mmcblk partition dumps, etc.</div>
  <div class="filename-pill" id="filenamePill">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <path d="M14 2v6h6"/>
    </svg>
    <span id="filenameText"></span>
  </div>
</label>
<input type="file" id="fileInput">

<div class="section-label" id="logLabel" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-3"/>
    <path d="M18 2l4 4-10 10H8v-4z"/>
  </svg>
  Decode log
</div>
<div id="log"></div>

<div class="section-label" id="previewLabel" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <path d="M21 15l-5-5L5 21"/>
  </svg>
  Preview
</div>
<div id="images"></div>

<div class="section-label" id="detailsLabel" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 8h.01M11 12h1v5h1"/>
  </svg>
  Technical details
</div>
<div id="details"></div>

<script>
// Minimal, dependency-free raw LZ4 block-format decompressor.
// (Standalone so this file has no external/CDN dependency at all.)
function lz4DecompressBlock(src, dst, sIndex, sLength, dIndex) {
  const sEnd = sIndex + sLength;
  const dStart = dIndex;
  while (sIndex < sEnd) {
    const token = src[sIndex++];
    let literalLength = token >>> 4;
    if (literalLength > 0) {
      if (literalLength === 15) {
        let b;
        do { b = src[sIndex++]; literalLength += b; } while (b === 255);
      }
      for (let i = 0; i < literalLength; i++) dst[dIndex++] = src[sIndex++];
    }
    if (sIndex >= sEnd) break;
    const offset = src[sIndex] | (src[sIndex + 1] << 8);
    sIndex += 2;
    let matchIndex = dIndex - offset;
    let matchLength = token & 0x0f;
    if (matchLength === 15) {
      let b;
      do { b = src[sIndex++]; matchLength += b; } while (b === 255);
    }
    matchLength += 4;
    for (let i = 0; i < matchLength; i++) { dst[dIndex++] = dst[matchIndex++]; }
  }
  return dIndex - dStart;
}

const logEl = document.getElementById('log');
const logLabel = document.getElementById('logLabel');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const filenamePill = document.getElementById('filenamePill');
const filenameText = document.getElementById('filenameText');

function log(msg, cls) {
  logLabel.style.display = 'flex';
  logEl.style.display = 'block';
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// Drag & drop support
['dragenter', 'dragover'].forEach(evt =>
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); })
);
['dragleave', 'drop'].forEach(evt =>
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); })
);
dropzone.addEventListener('drop', (e) => {
  const file = e.dataTransfer.files[0];
  if (file) {
    fileInput.files = e.dataTransfer.files;
    handleFile(file);
  }
});

document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
});

async function handleFile(file) {
    logEl.innerHTML = '';
    logEl.style.display = 'none';
    logLabel.style.display = 'none';
    document.getElementById('images').innerHTML = '';
    document.getElementById('previewLabel').style.display = 'none';
    document.getElementById('details').innerHTML = '';
    document.getElementById('detailsLabel').style.display = 'none';
    filenamePill.style.display = 'inline-flex';
    filenameText.textContent = file.name;
    if (!file) return;

    const buffer = await file.arrayBuffer();
    const data = new Uint8Array(buffer);
    const view = new DataView(buffer);

    const magic = new TextDecoder().decode(data.slice(0, 5));
    if (magic !== 'LZ4P8') {
        log(`Unexpected magic: "${magic}" (expected "LZ4P8"). Aborting.`, 'err');
        return;
    }

    // Header layout (all little-endian uint32 unless noted):
    //   0x00: "LZ4P8" magic (5 bytes)
    //   0x04: total decompressed size
    //   0x08: total compressed size (including this 0x48-byte header)
    //   0x0C: chunk size (decompressed size of each chunk, e.g. 262144 = 256KB)
    //   0x10: chunk count
    //   0x14..0x1F: reserved / unknown
    //   0x20: table of <chunk count> x uint32 compressed sizes
    //   0x48: raw LZ4 block-format compressed chunks, back to back
    const totalDecompressed = view.getUint32(0x04, true);
    const totalCompressedField = view.getUint32(0x08, true);
    const chunkSize = view.getUint32(0x0C, true);
    const chunkCount = view.getUint32(0x10, true);

    log(`Total decompressed size : ${totalDecompressed}`, 'hi');
    log(`Total compressed field  : ${totalCompressedField}`);
    log(`Chunk size (per block)  : ${chunkSize}`);
    log(`Chunk count             : ${chunkCount}`);

    const sizeTableOffset = 0x20;
    const chunkDataStart = 0x48;

    const sizes = [];
    for (let i = 0; i < chunkCount; i++) {
        sizes.push(view.getUint32(sizeTableOffset + i * 4, true));
    }
    log(`Chunk sizes: [${sizes.join(', ')}]  sum=${sizes.reduce((a,b)=>a+b,0)}`);

    const out = new Uint8Array(totalDecompressed);
    let outPos = 0;
    let inPos = chunkDataStart;
    let ok = true;
    const chunkLog = []; // {index, compOffset, compSize, decompOffset, decompSize}

    for (let i = 0; i < chunkCount; i++) {
        const csize = sizes[i];
        const remaining = totalDecompressed - outPos;
        const dsize = Math.min(chunkSize, remaining);
        chunkLog.push({ index: i, compOffset: inPos, compSize: csize, decompOffset: outPos, decompSize: dsize });

        try {
            // Raw LZ4 block format (no frame magic / no block-size prefix) -
            // decompress directly from the full buffer at inPos, straight into target.
            const target = new Uint8Array(dsize);
            const bytesWritten = lz4DecompressBlock(data, target, inPos, csize, 0);
            if (bytesWritten !== dsize) {
                log(`Chunk ${i}: WARNING decompressed ${bytesWritten}, expected ${dsize}`, 'warn');
            }
            out.set(target.subarray(0, dsize), outPos);
            log(`Chunk ${i}: ok  (compressed ${csize} -> decompressed ${dsize})`, 'ok');
        } catch (err) {
            ok = false;
            log(`Chunk ${i}: FAILED - ${err}`, 'err');
        }

        inPos += csize;
        outPos += dsize;
    }

    if (!ok) {
        log('One or more chunks failed to decompress; output may be corrupt/incomplete.', 'err');
    }

    // The reassembled buffer is a complete, standard BMP file (magic "BM" at byte 0).
    const sig = String.fromCharCode(out[0], out[1]);
    let width = 0, height = 0, bpp = 0, pixelOffset = 0;
    if (sig !== 'BM') {
        log(`Warning: reassembled data does not start with BMP signature "BM" (got "${sig}")`, 'warn');
    } else {
        const outView = new DataView(out.buffer);
        pixelOffset = outView.getUint32(10, true);
        width = outView.getInt32(18, true);
        height = outView.getInt32(22, true);
        bpp = outView.getUint16(28, true);
        log(`BMP OK: ${width} x ${height}, ${bpp}bpp, pixel data at 0x${pixelOffset.toString(16)}`, 'ok');
    }

    // --- Technical details panel ---
    {
        const fmt = (n) => n.toLocaleString();
        const hex = (n) => '0x' + n.toString(16).toUpperCase();
        const kb = (n) => (n / 1024).toFixed(1) + ' KB';

        // Try to identify source device/partition from filenames like "mmcblk0p25"
        const devMatch = file.name.match(/mmcblk(\d+)p(\d+)/i);
        let sourceCard;
        if (devMatch) {
            const blockNum = devMatch[1];
            const partNum = devMatch[2];
            sourceCard = {
                k: 'Source device',
                v: `mmcblk${blockNum} · partition ${partNum}`,
                hint: `An eMMC/SD storage device (type: MMC), controller/block index ${blockNum}, partition number ${partNum} — i.e. /dev/mmcblk${blockNum}p${partNum} on a Linux-based device.`
            };
        } else {
            sourceCard = {
                k: 'Source device',
                v: 'Unrecognized filename',
                hint: 'Rename to something like "mmcblkNpM" (e.g. mmcblk0p25) if this came from an eMMC/SD partition dump, so it can be auto-identified.'
            };
        }

        const cards = [
            sourceCard,
            {
                k: 'Resolution',
                v: (width && height) ? `${width} × ${Math.abs(height)} px` : 'Unknown',
                hint: 'Image width × height in pixels, read from the BMP header (offsets 0x12 and 0x16).'
            },
            {
                k: 'Color format',
                v: bpp ? `${bpp}-bit BGR` : 'Unknown',
                hint: bpp === 24
                    ? '24 bits per pixel, no alpha channel: 1 byte Blue, 1 byte Green, 1 byte Red per pixel (BMP stores color channels in reverse — BGR, not RGB). Rows are also stored bottom-to-top unless height is negative.'
                    : 'Bits per pixel, read from the BMP header (offset 0x1C).'
            },
            {
                k: 'File type',
                v: 'LZ4P8 container',
                hint: 'Custom proprietary format: a small header + a table of raw LZ4 block-compressed chunks, which decompress and concatenate into a plain BMP.'
            },
            {
                k: 'Container header size',
                v: `${chunkDataStart} bytes (${hex(chunkDataStart)})`,
                hint: 'Size of the LZ4P8 header before the first compressed chunk begins: magic + size fields + chunk size table.'
            },
            {
                k: 'BMP pixel data offset',
                v: sig === 'BM' ? `${fmt(pixelOffset)} bytes (${hex(pixelOffset)})` : 'N/A',
                hint: 'Byte offset inside the decompressed BMP where raw pixel bytes start (after the BMP file header + DIB header).'
            },
            {
                k: 'Decompressed size',
                v: `${fmt(totalDecompressed)} bytes (${kb(totalDecompressed)})`,
                hint: 'Total size of the final reassembled BMP file, stated in the LZ4P8 header at offset 0x04.'
            },
            {
                k: 'Compressed size',
                v: `${fmt(totalCompressedField)} bytes (${kb(totalCompressedField)})`,
                hint: `Total size of the original file (header + all compressed chunks). Compression ratio: ~${(totalDecompressed / totalCompressedField).toFixed(1)}×.`
            },
        ];

        let html = '<div class="info-grid">';
        for (const c of cards) {
            html += `<div class="info-card"><div class="k">${c.k}</div><div class="v">${c.v}</div><div class="hint">${c.hint}</div></div>`;
        }
        html += '</div>';

        html += `<table class="chunk-table"><thead><tr>
            <th>Chunk</th><th>Comp. offset</th><th>Comp. size</th><th>Decomp. offset</th><th>Decomp. size</th>
        </tr></thead><tbody>`;
        for (const c of chunkLog) {
            html += `<tr>
                <td>#${c.index}</td>
                <td>${hex(c.compOffset)}</td>
                <td class="mono-dim">${fmt(c.compSize)} B</td>
                <td>${hex(c.decompOffset)}</td>
                <td class="mono-dim">${fmt(c.decompSize)} B</td>
            </tr>`;
        }
        html += '</tbody></table>';

        document.getElementById('details').innerHTML = html;
        document.getElementById('detailsLabel').style.display = 'flex';
    }

    // Some embedding contexts don't render BMP via <img src="blob:...">, so
    // decode the pixel data ourselves onto a canvas (24bpp, bottom-up rows, BGR).
    if (sig === 'BM' && bpp === 24 && width > 0 && height !== 0) {
        const absHeight = Math.abs(height);
        const topDown = height < 0; // negative height = already top-down
        const rowSize = Math.floor((bpp * width + 31) / 32) * 4; // rows padded to 4 bytes

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = absHeight;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(width, absHeight);

        for (let y = 0; y < absHeight; y++) {
            const srcRow = topDown ? y : (absHeight - 1 - y);
            const rowStart = pixelOffset + srcRow * rowSize;
            for (let x = 0; x < width; x++) {
                const srcIdx = rowStart + x * 3;
                const dstIdx = (y * width + x) * 4;
                imgData.data[dstIdx]     = out[srcIdx + 2]; // R (BMP stores B,G,R)
                imgData.data[dstIdx + 1] = out[srcIdx + 1]; // G
                imgData.data[dstIdx + 2] = out[srcIdx];     // B
                imgData.data[dstIdx + 3] = 255;             // A
            }
        }
        ctx.putImageData(imgData, 0, 0);
        document.getElementById('previewLabel').style.display = 'flex';
        document.getElementById('images').appendChild(canvas);
    }

    const blob = new Blob([out], { type: 'image/bmp' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = file.name.replace(/\.[^.]+$/, '') + '_extracted.bmp';
    a.className = 'download-btn';
    a.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13m0 0l-4-4m4 4l4-4"/><path d="M4 20h16"/></svg> Download BMP`;
    document.getElementById('images').appendChild(a);
}

</script>
</body>
</html>
